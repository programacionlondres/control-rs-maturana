<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f0f0ec;color:#1a1a1a}
.header{background:#002060;padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:20}
.titulo{font-size:14px;font-weight:600;color:#fff}
.subtitulo{font-size:10px;color:#aac4ff}
.header-btns{display:flex;gap:5px}
.bh{font-size:11px;padding:5px 10px;border-radius:7px;border:none;cursor:pointer;font-weight:600}
.bh-admin{background:#FFD700;color:#002060}
.bh-img{background:#92D050;color:#1a3a00}
.bh-rep{background:#FF8C00;color:#fff}

/* Selector partida */
.partida-wrap{background:#fff;border-bottom:1px solid #ddd;padding:.6rem 1rem}
.partida-label{font-size:10px;color:#888;margin-bottom:4px;font-weight:500}
.partida-select{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #002060;font-size:13px;font-weight:600;color:#002060;background:#fff;cursor:pointer}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:.6rem 1rem}
.kpi{background:#fff;border-radius:8px;border:1px solid #e0e0db;padding:.5rem .3rem;text-align:center}
.kpi .num{font-size:18px;font-weight:700}
.kpi .lbl{font-size:8px;color:#888;margin-top:1px}
.prog-wrap{padding:0 1rem .3rem}
.prog-bar{height:5px;background:#ddd;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#92D050;border-radius:99px;transition:width .5s}
.prog-txt{font-size:10px;color:#888;text-align:right;margin-top:2px;padding-right:2px}

/* Plano */
.plano-label{font-size:10px;color:#888;padding:2px 1rem 3px;font-weight:500}
.plano-box{background:#fff;border-radius:8px;border:1px solid #e0e0db;margin:0 1rem .75rem;padding:8px;overflow-x:auto}
.plano-box svg{max-width:100%;height:auto}

/* Leyenda */
.ley{display:flex;gap:10px;padding:0 1rem .5rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#555}
.lc{width:12px;height:12px;border-radius:3px;border:1px solid}

/* Manzanas */
.manzanas{padding:0 1rem 2rem;display:flex;flex-direction:column;gap:8px}
.mz-bloque{background:#fff;border-radius:8px;border:1px solid #e0e0db;padding:.75rem}
.mz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.mz-nombre{font-size:12px;font-weight:600;color:#002060}
.mz-stats{font-size:10px;color:#888}
.mz-stats span{color:#375623;font-weight:600}
.lotes-grid{display:flex;flex-wrap:wrap;gap:3px}
.c{width:30px;height:26px;border-radius:4px;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;font-weight:600;color:#999;background:#f8f8f5;user-select:none;transition:all .15s}
.c:hover{transform:scale(1.15);z-index:2;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.c.ej{background:#92D050;border-color:#375623;color:#1a3a00}
.c.oculta{opacity:.08;pointer-events:none}

/* Modal ingreso */
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:100}
.mo.v{display:flex}
@media(min-width:480px){.mo{align-items:center}}
.md{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem 1.25rem 2.5rem;width:100%;max-width:380px}
@media(min-width:480px){.md{border-radius:12px;padding:1.25rem}}
.md h3{font-size:15px;font-weight:600;margin-bottom:4px;color:#002060}
.md .sub{font-size:11px;color:#888;margin-bottom:1.25rem}
.estado-opts{display:flex;gap:10px;margin-bottom:1.25rem}
.opt{flex:1;padding:14px 8px;border-radius:10px;border:2px solid #e0e0db;text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.opt.nd{color:#888}
.opt.nd.sel{background:#f0f0ec;border-color:#888;color:#333}
.opt.ej-o{color:#375623}
.opt.ej-o.sel{background:#92D050;border-color:#375623;color:#1a3a00}
.mbb{display:flex;gap:8px}
.mbb button{flex:1;padding:10px;border-radius:8px;border:1px solid #ccc;background:#f5f5f3;cursor:pointer;font-size:13px;font-weight:500}
.bgs{background:#002060!important;color:#fff!important;border-color:#001040!important}

/* Modal PIN */
.po{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200}
.po.v{display:flex}
.pm{background:#fff;border-radius:12px;padding:1.25rem;width:260px}
.pm h3{font-size:14px;font-weight:600;margin-bottom:.75rem;color:#002060}
.pi{width:100%;padding:10px;border-radius:8px;border:1.5px solid #ccc;font-size:22px;letter-spacing:8px;text-align:center;margin-bottom:5px}
.pi:focus{outline:none;border-color:#002060}
.pe{font-size:11px;color:#A32D2D;text-align:center;margin-bottom:6px;display:none}
.abadge{font-size:10px;background:#92D050;color:#1a3a00;border:1px solid #375623;border-radius:99px;padding:2px 8px;display:none}
.abadge.v{display:inline-block}

/* Modal reporte */
.mr{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:150}
.mr.v{display:flex}
@media(min-width:480px){.mr{align-items:center}}
.mrd{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
@media(min-width:480px){.mrd{border-radius:12px}}
.mrd h3{font-size:14px;font-weight:600;color:#002060;margin-bottom:1rem}
.rep-tabla{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:1rem}
.rep-tabla th{background:#002060;color:#fff;padding:5px 4px;text-align:center;font-size:10px}
.rep-tabla td{padding:4px;border:1px solid #e0e0db;text-align:center}
.rep-tabla td:nth-child(2){text-align:left;font-size:9px}
.rep-tabla tr:nth-child(even) td{background:#f5f5f3}
.rep-tabla .tot-row td{background:#002060;color:#fff;font-weight:700}
.rep-cierre{text-align:center;font-size:11px;color:#555;margin-bottom:1rem}
.rep-btns{display:flex;gap:8px}
.rep-btns button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-capturar{background:#002060;color:#fff}
.btn-cerrar-rep{background:#f0f0ec;color:#555;border:1px solid #ccc!important;border:none}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:12px;padding:7px 16px;border-radius:99px;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Modal programa semanal */
.mps{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:150}
.mps.v{display:flex}
@media(min-width:480px){.mps{align-items:center}}
.mpsd{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.mpsd{border-radius:12px}}
.mpsd h3{font-size:14px;font-weight:600;color:#002060;margin-bottom:.5rem}
.mpsd .sub{font-size:11px;color:#888;margin-bottom:1rem}
.prog-tabla{width:100%;border-collapse:collapse;font-size:11px}
.prog-tabla th{background:#002060;color:#fff;padding:5px 4px;text-align:center;font-size:10px}
.prog-tabla td{padding:4px;border:1px solid #e0e0db;text-align:left;font-size:9px}
.prog-tabla td:nth-child(n+3){text-align:center}
.prog-tabla input{width:36px;padding:2px;text-align:center;border:1px solid #ccc;border-radius:3px;font-size:11px}
.prog-tabla tr:nth-child(even) td{background:#f5f5f3}
</style>

];

function key(pid,mz,l){ return "ap_"+pid+"_"+mz+"_"+l; }
function getEj(pid,mz,l){ return localStorage.getItem(key(pid,mz,l))==="1"; }
function setEj(pid,mz,l,v){ if(v) localStorage.setItem(key(pid,mz,l),"1"); else localStorage.removeItem(key(pid,mz,l)); }

// Obtener ejecutados HOY
function keyHoy(pid,mz,l){
  var d=new Date().toISOString().slice(0,10);
  return "aphoy_"+pid+"_"+mz+"_"+l+"_"+d;
}
function getEjHoy(pid,mz,l){ return localStorage.getItem(keyHoy(pid,mz,l))==="1"; }
function setEjHoy(pid,mz,l,v){ if(v) localStorage.setItem(keyHoy(pid,mz,l),"1"); else localStorage.removeItem(keyHoy(pid,mz,l)); }

function cambiarPartida(){
  partidaActual = document.getElementById("sel-partida").value;
  renderKPIs();
  updateSVG();
  renderManzanas();
}

function renderKPIs(){
  var tot=0,ej=0,ejHoy=0;
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      tot++;
      if(getEj(partidaActual,mz.id,mz.lotes[j])) ej++;
      if(getEjHoy(partidaActual,mz.id,mz.lotes[j])) ejHoy++;
    }
  }
  var pend=tot-ej;
  var pct=Math.round(ej/tot*100);
  document.getElementById("kpis").innerHTML=
    "<div class='kpi'><div class='num'>"+tot+"</div><div class='lbl'>Total</div></div>"+
    "<div class='kpi'><div class='num' style='color:#375623'>"+ej+"</div><div class='lbl'>Ejecutados</div></div>"+
    "<div class='kpi'><div class='num' style='color:#888'>"+pend+"</div><div class='lbl'>Pendientes</div></div>"+
    "<div class='kpi'><div class='num' style='color:#FF8C00'>"+ejHoy+"</div><div class='lbl'>Hoy</div></div>";
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-txt").textContent="Avance: "+pct+"% ("+ej+" de "+tot+")";
}

function updateSVG(){
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      var l=mz.lotes[j];
      var num=String(l).padStart(2,"0");
      var el=document.getElementById("mz"+mz.id.toLowerCase()+"-vivienda-"+num);
      if(el){
        var rect=el.querySelector("rect");
        if(rect) rect.className.baseVal=getEj(partidaActual,mz.id,l)?"lot lot-ej":"lot";
      }
    }
  }
}

function renderManzanas(){
  var cont=document.getElementById("manzanas");
  cont.innerHTML="";
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    var ej=0;
    for(var j=0;j<mz.lotes.length;j++) if(getEj(partidaActual,mz.id,mz.lotes[j])) ej++;
    var tot=mz.lotes.length;
    var pct=Math.round(ej/tot*100);
    var blq=document.createElement("div");
    blq.className="mz-bloque";
    blq.innerHTML="<div class='mz-header'><div class='mz-nombre'>"+mz.nombre+" <span style='font-weight:400;color:#aaa'>("+tot+")</span></div>"+
      "<div class='mz-stats'><span>"+ej+"</span> / "+tot+" ("+pct+"%)</div></div>"+
      "<div class='lotes-grid' id='grid-"+mz.id+"'></div>";
    cont.appendChild(blq);
    var grid=document.getElementById("grid-"+mz.id);
    for(var j=0;j<mz.lotes.length;j++){
      var l=mz.lotes[j];
      var ejs=getEj(partidaActual,mz.id,l);
      var ejh=getEjHoy(partidaActual,mz.id,l);
      var d=document.createElement("div");
      d.className="c"+(ejs?" ej":"");
      if(ejh&&ejs) d.style.outline="2px solid #FF8C00";
      d.dataset.mz=mz.id; d.dataset.l=l;
      d.textContent=l;
      d.addEventListener("click",(function(mzid,lot){return function(){clickLote(mzid,lot);};})(mz.id,l));
      grid.appendChild(d);
    }
  }
}

function clickLote(mz,l){
  if(!admin){pc={mz:mz,l:l};openPin();return;}
  ca={mz:mz,l:l};
  var ejs=getEj(partidaActual,mz,l);
  optSel=ejs?"ej":"nd";
  var pid=PARTIDAS.find(function(p){return p.id===partidaActual;});
  document.getElementById("mt").textContent="Manzana "+mz+" - Lote "+l;
  document.getElementById("msub").textContent=pid?pid.nombre:"";
  actualizarOpts();
  document.getElementById("mo").classList.add("v");
}

function selOpt(v){
  optSel=v;
  actualizarOpts();
}

function actualizarOpts(){
  document.getElementById("opt-nd").className="opt nd"+(optSel==="nd"?" sel":"");
  document.getElementById("opt-ej").className="opt ej-o"+(optSel==="ej"?" sel":"");
}

function guardar(){
  if(!ca) return;
  var antes=getEj(partidaActual,ca.mz,ca.l);
  var nuevo=optSel==="ej";
  setEj(partidaActual,ca.mz,ca.l,nuevo);
  if(nuevo&&!antes) setEjHoy(partidaActual,ca.mz,ca.l,true);
  else if(!nuevo) setEjHoy(partidaActual,ca.mz,ca.l,false);
  cm();
  renderKPIs();
  updateSVG();
  renderManzanas();
  showT("Guardado");
  // Guardar en Google Sheets (sin bloquear la UI)
  var fecha=new Date().toISOString().slice(0,10);
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      accion:"guardar_snapshot",
      fecha:fecha,
      partida:partidaActual,
      manzana:ca.mz,
      lote:ca.l,
      ejecutado:nuevo?1:0
    })
  }).catch(function(){});
}

function cm(){ document.getElementById("mo").classList.remove("v"); ca=null; }

function openPin(){
  document.getElementById("pi").value="";
  document.getElementById("pe").style.display="none";
  document.getElementById("po").classList.add("v");
  setTimeout(function(){document.getElementById("pi").focus();},150);
}
function cp(){ document.getElementById("po").classList.remove("v"); pc=null; }
function vp(){
  var v=document.getElementById("pi").value;
  if(v.length>=4){
    if(v===PIN){
      admin=true;
      document.getElementById("ab").classList.add("v");
      cp();
      if(pc){clickLote(pc.mz,pc.l);pc=null;}
      showT("Admin activado");
    } else document.getElementById("pe").style.display="block";
  } else document.getElementById("pe").style.display="none";
}

function abrirReporte(){
  var hoy=new Date();
  var dias=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
  var meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById("rep-fecha").textContent=
    "Reporte al "+dias[hoy.getDay()]+" "+hoy.getDate()+" de "+meses[hoy.getMonth()]+" "+hoy.getFullYear();

  var tabla=document.getElementById("rep-tabla");
  tabla.innerHTML="<tr><th>N</th><th>PARTIDA</th><th>PROG<br>TOTAL</th><th>EJEC<br>AC</th><th>%</th><th>HOY</th></tr>";

  var totProg=0,totEj=0,totHoy=0;
  for(var i=0;i<PARTIDAS.length;i++){
    var p=PARTIDAS[i];
    var ej=0,ejHoy=0,tot=TOTAL;
    for(var m=0;m<MANZANAS.length;m++){
      var mz=MANZANAS[m];
      for(var j=0;j<mz.lotes.length;j++){
        if(getEj(p.id,mz.id,mz.lotes[j])) ej++;
        if(getEjHoy(p.id,mz.id,mz.lotes[j])) ejHoy++;
      }
    }
    var pct=Math.round(ej/tot*100);
    totEj+=ej; totHoy+=ejHoy;
    var trClass=ejHoy>0?" style='background:#FFF9E6'":" ";
    tabla.innerHTML+="<tr"+trClass+"><td>"+(i+1)+"</td><td>"+p.nombre+"</td><td>"+tot+"</td><td>"+ej+"</td><td>"+pct+"%</td><td>"+(ejHoy>0?"<b style='color:#FF8C00'>+"+ejHoy+"</b>":"-")+"</td></tr>";
  }
  tabla.innerHTML+="<tr class='tot-row'><td colspan='2'>TOTAL</td><td>"+TOTAL+"</td><td>"+totEj+"</td><td>-</td><td>+"+totHoy+"</td></tr>";

  document.getElementById("mr").classList.add("v");
}

function cerrarDia(){
  if(!confirm("Cerrar el dia y guardar snapshot completo en Google Sheets?")) return;
  var fecha=new Date().toISOString().slice(0,10);
  var registros=[];
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      for(var k=0;k<PARTIDAS.length;k++){
        var pid=PARTIDAS[k].id;
        var ej=getEj(pid,mz.id,mz.lotes[j])?1:0;
        registros.push({accion:"guardar_snapshot",fecha:fecha,partida:pid,manzana:mz.id,lote:mz.lotes[j],ejecutado:ej});
      }
    }
  }
  showT("Guardando "+registros.length+" registros...");
  var enviados=0;
  function enviarSiguiente(){
    if(enviados>=registros.length){showT("Dia cerrado y guardado en Sheets");return;}
    fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(registros[enviados])})
      .then(function(){enviados++;enviarSiguiente();})
      .catch(function(){enviados++;enviarSiguiente();});
  }
  enviarSiguiente();
}

function cerrarHistorico(){ document.getElementById("mh-modal").classList.remove("v"); }

function buscarHistorico(){
  var fecha=document.getElementById("hist-fecha").value;
  var partida=document.getElementById("hist-partida").value;
  if(!fecha){alert("Selecciona una fecha");return;}
  document.getElementById("hist-resultado").textContent="Buscando...";
  document.getElementById("hist-manzanas").innerHTML="";
  fetch(SCRIPT_URL+"?accion=get_snapshot&fecha="+fecha+"&partida="+partida)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok||data.datos.length===0){
        document.getElementById("hist-resultado").textContent="No hay datos para esa fecha y partida.";
        return;
      }
      document.getElementById("hist-resultado").textContent="";
      // Construir mapa de ejecutados
      var ejMap={};
      for(var i=0;i<data.datos.length;i++){
        ejMap[data.datos[i].mz+"_"+data.datos[i].lote]=data.datos[i].ejecutado===1||data.datos[i].ejecutado==="1";
      }
      // Mostrar por manzana
      var cont=document.getElementById("hist-manzanas");
      cont.innerHTML="<div style='font-size:11px;font-weight:600;color:#002060;margin-bottom:6px'>Estado al "+fecha+":</div>";
      for(var m=0;m<MANZANAS.length;m++){
        var mz=MANZANAS[m];
        var ej=0;
        for(var j=0;j<mz.lotes.length;j++) if(ejMap[mz.id+"_"+mz.lotes[j]]) ej++;
        var div=document.createElement("div");
        div.style.cssText="margin-bottom:6px;background:#f5f5f3;border-radius:6px;padding:6px 8px";
        div.innerHTML="<div style='font-size:11px;font-weight:600;color:#002060;margin-bottom:4px'>"+mz.nombre+" - <span style='color:#375623'>"+ej+"/"+mz.lotes.length+"</span></div>";
        var grid=document.createElement("div");
        grid.style.cssText="display:flex;flex-wrap:wrap;gap:2px";
        for(var j=0;j<mz.lotes.length;j++){
          var l=mz.lotes[j];
          var ejecutado=ejMap[mz.id+"_"+l];
          var c=document.createElement("div");
          c.style.cssText="width:24px;height:20px;border-radius:3px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;";
          c.style.background=ejecutado?"#92D050":"#f8f8f5";
          c.style.borderColor=ejecutado?"#375623":"#ccc";
          c.style.color=ejecutado?"#1a3a00":"#aaa";
          c.textContent=l;
          grid.appendChild(c);
        }
        div.appendChild(grid);
        cont.appendChild(div);
      }
    })
    .catch(function(){ document.getElementById("hist-resultado").textContent="Error al conectar con Google Sheets."; });
}
