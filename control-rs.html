<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f0ec;color:#1a1a1a}
.header{background:#1A1846;border-bottom:none;padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:20}
.titulo{font-size:14px;font-weight:600;color:#fff}
.subtitulo{font-size:11px;color:#90C8FF}
.resumen{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:.6rem 1rem}
.cs{background:#fff;border-radius:7px;border:1px solid #e0e0db;padding:.4rem .3rem;text-align:center}
.cs .num{font-size:18px;font-weight:600}
.cs .lbl{font-size:9px;color:#888;margin-top:1px}
.bp{height:4px;background:#ddd;border-radius:99px;margin:0 1rem .25rem;overflow:hidden}
.bpf{height:100%;background:#1D9E75;border-radius:99px;transition:width .5s}
.ptxt{font-size:10px;color:#888;padding:0 1rem .4rem;text-align:right}
.filtros{display:flex;gap:4px;padding:0 1rem .4rem;flex-wrap:wrap;align-items:center}
.filtros span{font-size:11px;color:#888}
.fb{font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555}
.fb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.bh{font-size:11px;padding:4px 8px;border-radius:7px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);cursor:pointer;color:#fff;display:flex;align-items:center;gap:3px;text-decoration:none}
.ley{display:flex;flex-wrap:wrap;gap:7px;padding:0 1rem .75rem}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#555}
.lc{width:12px;height:12px;border-radius:3px;border:1px solid}
.svg-wrap{overflow-x:auto;padding:.5rem 1rem .75rem;background:#fff;margin:0 1rem .75rem;border-radius:10px;border:1px solid #e0e0db}
.svg-wrap svg{max-width:100%;height:auto}
.svg-label{font-size:10px;color:#888;padding:.5rem 1rem .25rem;font-weight:500}
.manzanas{padding:0 1rem 2rem;display:flex;flex-direction:column;gap:10px}
.mz-bloque{background:#fff;border-radius:10px;border:1px solid #e0e0db;padding:.75rem}
.mz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.mz-nombre{font-size:13px;font-weight:600;color:#002060}
.mz-stats{font-size:11px;color:#888}
.lotes-grid{display:flex;flex-wrap:wrap;gap:4px}
.c{width:34px;height:30px;border-radius:4px;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;font-weight:600;color:#888;background:#f8f8f5;user-select:none;transition:transform .1s}
.c:hover{transform:scale(1.15);z-index:2;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.c.sg{background:#90C8FF;border-color:#1a5fa8;color:#003580}
.c.r0{background:#90EE90;border-color:#2e8b2e;color:#1a4a1a}
.c.r0obs{background:#FFD700;border-color:#B8860B;color:#5a3a00;position:relative}
.c.r1{background:#228B22;border-color:#145214;color:#fff}
.c.rf{background:#006400;border-color:#003200;color:#fff;font-size:11px}
.c.oculta{opacity:.08;pointer-events:none}
.c.r0obs::after{content:"!";position:absolute;top:-4px;right:-4px;background:#FF6B00;color:#fff;border-radius:50%;width:12px;height:12px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.c.atrasado{background:#FF6B6B;border-color:#CC0000;color:#fff}
.c.esta-semana{background:#FF8C00;border-color:#CC5500;color:#fff}
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}
.mo.v{display:flex}
@media(min-width:480px){.mo{align-items:center}}
.md{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:380px}
@media(min-width:480px){.md{border-radius:12px;padding:1.25rem}}
.md h3{font-size:14px;font-weight:600;margin-bottom:2px}
.mds{font-size:11px;color:#888;margin-bottom:1rem}
.hs{display:flex;flex-direction:column;gap:6px}
.hr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1.5px solid #e0e0db;background:#f9f9f7;cursor:pointer}
.hr.al.sg-h{border-color:#1a5fa8;background:#E6F1FB}
.hr.al.r0-h{border-color:#b07000;background:#FAEEDA}
.hr.al.r1-h{border-color:#2a7000;background:#EAF3DE}
.hr.al.rf-h{border-color:#0a5035;background:#E1F5EE}
.hc{width:20px;height:20px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.hc.m.sg-c{background:#1a5fa8;border-color:#1a5fa8;color:#fff}
.hc.m.r0-c{background:#b07000;border-color:#b07000;color:#fff}
.hc.m.r1-c{background:#2a7000;border-color:#2a7000;color:#fff}
.hc.m.rf-c{background:#0F8C55;border-color:#0a5035;color:#fff}
.hl{font-size:13px;font-weight:500;flex:1}
.mbb{display:flex;gap:8px;margin-top:1rem}
.mbb button{flex:1;padding:9px;border-radius:8px;border:1px solid #ccc;background:#f5f5f3;cursor:pointer;font-size:13px;font-weight:500}
.bgs{background:#1D9E75!important;color:#fff!important;border-color:#0F6E56!important}
.po{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
.po.v{display:flex}
.pm{background:#fff;border-radius:12px;padding:1.25rem;width:250px}
.pm h3{font-size:13px;font-weight:600;margin-bottom:.75rem}
.pi{width:100%;padding:9px;border-radius:8px;border:1.5px solid #ccc;font-size:20px;letter-spacing:6px;text-align:center;margin-bottom:5px}
.pi:focus{outline:none;border-color:#378ADD}
.pe{font-size:11px;color:#A32D2D;text-align:center;margin-bottom:6px;display:none}
.abadge{font-size:10px;background:#EAF3DE;color:#27500A;border:1px solid #639922;border-radius:99px;padding:2px 7px;display:none}
.abadge.v{display:inline-block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:12px;padding:6px 14px;border-radius:99px;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.mr-sem{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:150}
.mr-sem.v{display:flex}
@media(min-width:480px){.mr-sem{align-items:center}}
.mrd-sem{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.mrd-sem{border-radius:12px}}
.mo-tip{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200}
.mo-tip.v{display:flex}
.md-tip{background:#fff;border-radius:12px;padding:1.25rem;width:calc(100% - 2rem);max-width:520px;max-height:90vh;overflow-y:auto}
.md-tip h3{font-size:14px;font-weight:600;margin-bottom:.75rem;color:#002060}
.tip-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:.5rem}
.tip-table th{background:#1A1846;color:#fff;padding:6px 5px;text-align:center;font-weight:600;white-space:nowrap}
.tip-table th:first-child{text-align:left;padding-left:8px}
.tip-table td{padding:5px 5px;text-align:center;border-bottom:1px solid #eee}
.tip-table td:first-child{text-align:left;font-weight:600;padding-left:8px}
.tip-table tr.tip-tot td{font-weight:700;background:#f0f0ec;border-top:2px solid #ccc}
.tip-table .zero{color:#ccc}
.tip-close{width:100%;margin-top:1rem;padding:9px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
</style>

function colorFecha(mz, l, hitosAlcanzados) {
  var key = mz + "-" + l;
  var fecha = FECHAS_R0[key];
  var u = uH(hitosAlcanzados);
  // Si ya tiene R0 o superior, usar color normal de hito
  if (u && (u === "r0" || u === "r0obs" || u === "r1" || u === "rf")) return null; // usar color hito
  if (!fecha) return null; // sin fecha, color normal
  var hoy = new Date();
  hoy.setHours(0,0,0,0);
  var fprog = new Date(fecha);
  fprog.setHours(0,0,0,0);
  var diff = Math.floor((fprog - hoy) / (1000*60*60*24));
  if (diff < 0) return "atrasado";      // venció sin R0
  if (diff <= 7) return "esta-semana";  // programado esta semana
  return null; // aún no corresponde
}
function gH(mz,l){var v=localStorage.getItem("rs_"+mz+"_"+l);return v?JSON.parse(v):[];}
function sH(mz,l,a){localStorage.setItem("rs_"+mz+"_"+l,JSON.stringify(a));}
function uH(h){var mx=0,u=null;for(var i=0;i<h.length;i++)if(EN[h[i]]>mx){mx=EN[h[i]];u=h[i];}return u;}
function dv(h,f){
  if(f==="todos")return true;
  if(f==="nd")return h.length===0;
  if(h.indexOf(f)>=0)return true;
  for(var i=ET.indexOf(f)+1;i<ET.length;i++)if(h.indexOf(ET[i])>=0)return true;
  return false;
}

function updateSVG(){
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      var l=mz.lotes[j];
      var h=gH(mz.id,l),u=uH(h);
      var num=String(l).padStart(2,"0");
      var svgEl=document.getElementById("mz"+mz.id.toLowerCase()+"-vivienda-"+num);
      if(svgEl){
        var rect=svgEl.querySelector("rect");
        if(rect){
          var cf2=colorFecha(mz.id,l,h);
          var displayU=(fa!=="todos"&&fa!=="si")?fa:u;
          var lotCls="lot";
          if(displayU) lotCls+=" lot-"+displayU;
          else if(cf2) lotCls+=" lot-"+cf2;
          rect.className.baseVal=lotCls;
        }
        svgEl.style.opacity=dv(h,fa)?"1":"0.08";
      }
    }
  }
}

function renderManzanas(){
  var cont=document.getElementById("manzanas");
  cont.innerHTML="";
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    var sg=0,r0=0,r1=0,rf=0;
    for(var j=0;j<mz.lotes.length;j++){var u=uH(gH(mz.id,mz.lotes[j]));if(u==="sg")sg++;else if(u==="r0")r0++;else if(u==="r1")r1++;else if(u==="rf")rf++;}
    var tot=mz.lotes.length,acRF=rf;
    var blq=document.createElement("div");blq.className="mz-bloque";
    blq.innerHTML="<div class='mz-header'><div class='mz-nombre'>"+mz.nombre+" <span style='font-weight:400;color:#aaa'>("+tot+" lotes)</span></div>"+
      "<div class='mz-stats'>SG:"+(sg+r0+r1+rf)+" R0:"+(r0+r1+rf)+" R1:"+(r1+rf)+" <span style='color:#1D9E75;font-weight:600'>RF:"+rf+"</span></div></div>"+
      "<div class='lotes-grid' id='grid-"+mz.id+"'></div>";
    cont.appendChild(blq);
    var grid=document.getElementById("grid-"+mz.id);
    for(var j=0;j<mz.lotes.length;j++){
      var l=mz.lotes[j],h=gH(mz.id,l),u=uH(h);
      var d=document.createElement("div");
      var cf = colorFecha(mz.id, l, h);
      var cls = "c";
      if (u) cls += " " + u;
      else if (cf) cls += " " + cf;
      d.className=cls;
      d.dataset.mz=mz.id;d.dataset.l=l;
      var keyF = mz.id + "-" + l;
      var fR0 = FECHAS_R0[keyF] ? " (R0 prog: "+FECHAS_R0[keyF]+")" : "";
      d.title = "Mz." + mz.id + " L" + l + fR0;
      d.textContent=(u==="rf")?"✓ "+l:l;
      if(!dv(h,fa))d.classList.add("oculta");
      d.addEventListener("click",(function(mzid,lot){return function(){click(mzid,lot);};})(mz.id,l));
      grid.appendChild(d);
    }
  }
}

function r0Programadas(){
  var hoy=new Date(); hoy.setHours(0,0,0,0);
  var cnt=0;
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      var key=mz.id+"-"+mz.lotes[j];
      var f=FECHAS_R0[key];
      if(f){var fp=new Date(f);fp.setHours(0,0,0,0);if(fp<=hoy)cnt++;}
    }
  }
  return cnt;
}
function renderRes(){
  var tot=0,sg=0,r0=0,r1=0,rf=0;
  for(var i=0;i<MANZANAS.length;i++)for(var j=0;j<MANZANAS[i].lotes.length;j++){
    tot++;var u=uH(gH(MANZANAS[i].id,MANZANAS[i].lotes[j]));
    if(u==="sg")sg++;else if(u==="r0")r0++;else if(u==="r1")r1++;else if(u==="rf")rf++;
  }
  var acSG=sg+r0+r1+rf,acR0=r0+r1+rf,acR1=r1+rf,pct=Math.round(rf/tot*100);
  var r0prog=r0Programadas();
  document.getElementById("res").innerHTML=
    "<div class='cs'><div class='num'>"+tot+"</div><div class='lbl'>Total</div></div>"+
    "<div class='cs'><div class='num' style='color:#185FA5'>"+acSG+"</div><div class='lbl'>&ge; SG</div></div>"+
    "<div class='cs'><div class='num' style='color:#BA7517;font-size:13px'>"+acR0+" <span style='color:#888;font-size:10px;font-weight:400'>/ "+r0prog+"</span></div><div class='lbl'>&ge; R0 real/prog</div></div>"+
    "<div class='cs'><div class='num' style='color:#3B6D11'>"+acR1+"</div><div class='lbl'>&ge; R1</div></div>"+
    "<div class='cs'><div class='num' style='color:#1D9E75'>"+rf+"</div><div class='lbl'>RF</div></div>";
  document.getElementById("bpf").style.width=pct+"%";
  document.getElementById("ptxt").textContent="Avance a RF: "+pct+"% ("+rf+" de "+tot+")";
}

function filtrar(f){

}

function rHitos(){
  var c=document.getElementById("mh");c.innerHTML="";
  for(var i=0;i<ET.length;i++){
    var e=ET[i],m=ht.indexOf(e)>=0;
    var r=document.createElement("div");
    r.className="hr"+(m?" al "+e+"-h":"");
    r.setAttribute("data-e",e);
    r.onclick=function(){tog(this.getAttribute("data-e"));};
    var chk=document.createElement("div");chk.className="hc"+(m?" m "+e+"-c":"");chk.textContent=m?"v":"";
    var lb=document.createElement("div");lb.className="hl";lb.textContent=EL[e];
    r.appendChild(chk);r.appendChild(lb);c.appendChild(r);
  }
}

function tog(e){
  if(ht.indexOf(e)>=0){ht=ht.filter(function(h){return EN[h]<EN[e];});}
  else{var i=ET.indexOf(e);for(var j=0;j<=i;j++)if(ht.indexOf(ET[j])<0)ht.push(ET[j]);}
  rHitos();
}

function capturar(){
  var btn=document.getElementById('btn-cap');
  btn.textContent='Generando...';
  btn.disabled=true;
  var target=document.getElementById('svg-wrap');
  html2canvas(target,{
    scale:2,
    useCORS:true,
    backgroundColor:'#ffffff',
    scrollX:0,
    scrollY:-window.scrollY
  }).then(function(svgCanvas){
    // Capturar header + resumen + filtros + plano
    var topEl=document.querySelector('.header');
    var bottomEl=document.getElementById('svg-wrap');
    var topRect=topEl.getBoundingClientRect();
    var bottomRect=bottomEl.getBoundingClientRect();
    var totalH=bottomRect.bottom-topRect.top;
    var totalW=Math.max(topEl.offsetWidth,bottomEl.offsetWidth);

    html2canvas(document.body,{
      scale:2,
      useCORS:true,
      backgroundColor:'#f0f0ec',
      x:0,
      y:window.scrollY+topRect.top,
      width:document.body.clientWidth,
      height:totalH,
      windowWidth:document.body.clientWidth,
      windowHeight:totalH
    }).then(function(canvas){
      var a=document.createElement('a');
      a.download='reporte_rs_maturana_'+new Date().toISOString().slice(0,10)+'.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
      btn.textContent='Imagen';
      btn.disabled=false;
      showT('Imagen descargada');
    }).catch(function(){
      btn.textContent='Imagen';
      btn.disabled=false;
      showT('Error al generar imagen');
    });
  });
}

function abrirInformeSemanal(){
  var hoy=new Date();
  var diasN=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  var mesesN=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById("inf-semana").textContent=diasN[hoy.getDay()]+" "+hoy.getDate()+" de "+mesesN[hoy.getMonth()]+" "+hoy.getFullYear();
  var tot_g=0,sg_g=0,r0_g=0,r1_g=0,rf_g=0;
  var html="<tr style='background:#f5f5f3'><th style='padding:5px 6px;text-align:left;border-bottom:1px solid #ddd'>Manzana</th><th style='padding:5px;text-align:center;border-bottom:1px solid #ddd'>Total</th><th style='padding:5px;text-align:center;border-bottom:1px solid #ddd;color:#185FA5'>&ge;SG</th><th style='padding:5px;text-align:center;border-bottom:1px solid #ddd;color:#BA7517'>&ge;R0</th><th style='padding:5px;text-align:center;border-bottom:1px solid #ddd;color:#3B6D11'>&ge;R1</th><th style='padding:5px;text-align:center;border-bottom:1px solid #ddd;color:#1D9E75'>RF</th></tr>";
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i],sg=0,r0=0,r1=0,rf=0;
    for(var j=0;j<mz.lotes.length;j++){var u=uH(gH(mz.id,mz.lotes[j]));if(u==="sg")sg++;else if(u==="r0"||u==="r0obs")r0++;else if(u==="r1")r1++;else if(u==="rf")rf++;}
    var tot=mz.lotes.length,acSG=sg+r0+r1+rf,acR0=r0+r1+rf,acR1=r1+rf;
    tot_g+=tot;sg_g+=acSG;r0_g+=acR0;r1_g+=acR1;rf_g+=rf;
    html+="<tr style='border-bottom:1px solid #eee'><td style='padding:5px 6px;font-weight:500'>"+mz.nombre+"</td><td style='padding:5px;text-align:center'>"+tot+"</td><td style='padding:5px;text-align:center;color:#185FA5'>"+acSG+"</td><td style='padding:5px;text-align:center;color:#BA7517'>"+acR0+"</td><td style='padding:5px;text-align:center;color:#3B6D11'>"+acR1+"</td><td style='padding:5px;text-align:center;color:#1D9E75;font-weight:600'>"+rf+"</td></tr>";
  }
  html+="<tr style='background:#f0f7ed;font-weight:600'><td style='padding:5px 6px'>TOTAL</td><td style='padding:5px;text-align:center'>"+tot_g+"</td><td style='padding:5px;text-align:center;color:#185FA5'>"+sg_g+"</td><td style='padding:5px;text-align:center;color:#BA7517'>"+r0_g+"</td><td style='padding:5px;text-align:center;color:#3B6D11'>"+r1_g+"</td><td style='padding:5px;text-align:center;color:#1D9E75'>"+rf_g+"</td></tr>";
  document.getElementById("inf-tabla").innerHTML=html;
  document.getElementById("inf-nota").textContent="Control de Rs · Constructora Londres · Enrique Maturana";
  document.getElementById("mr-sem").classList.add("v");
}

function cerrarDiaRs(){
  if(!admin){showT("Requiere acceso admin");openPin();return;}
  if(!confirm("¿Cerrar día y guardar avance en Google Sheets?"))return;
  // Calcular totales por manzana
  var totales=[];
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i],sg=0,r0=0,r1=0,rf=0;
    for(var j=0;j<mz.lotes.length;j++){
      var u=uH(gH(mz.id,mz.lotes[j]));
      if(u==="sg")sg++;
      else if(u==="r0"||u==="r0obs")r0++;
      else if(u==="r1")r1++;
      else if(u==="rf")rf++;
    }
    totales.push({manzana:mz.id,sg:sg,r0:r0,r1:r1,rf:rf,total:mz.lotes.length});
  }
  var hoy=new Date().toISOString().slice(0,10);
  var url=SCRIPT_URL+"?accion=cerrarDia&fecha="+hoy+"&datos="+encodeURIComponent(JSON.stringify(totales));
  showT("Guardando...");
  fetch(url)
  .then(function(r){return r.json();})
  .then(function(r){showT(r.ok?"Día cerrado ✓ ("+r.manzanas+" manzanas)":"Error: "+(r.error||""));})
  .catch(function(){showT("No se pudo conectar");});
}

function mostrarTipologia(){
  var tipos=["sm1","sm2","vul","emer","mov"];
  var tLbl={sm1:"SM1",sm2:"SM2",vul:"Vulnerable",emer:"Emergente",mov:"Mov.Red."};
  var estados=["nd","sg","r0","r0obs","r1","rf"];
  var eLbl={nd:"S/I",sg:"SG",r0:"R0",r0obs:"R0+O",r1:"R1",rf:"RF"};
  var cnt={};
  tipos.forEach(function(t){cnt[t]={};estados.forEach(function(e){cnt[t][e]=0;});});
  for(var i=0;i<MANZANAS.length;i++){
    var mz=MANZANAS[i];
    for(var j=0;j<mz.lotes.length;j++){
      var l=mz.lotes[j];
      var tip=(TIPOLOGIAS[mz.id]&&TIPOLOGIAS[mz.id][l])||"sm1";
      var h=gH(mz.id,l);
      var est=uH(h)||"nd";
      cnt[tip][est]++;
    }
  }
  var html='<table class="tip-table"><thead><tr><th>Tipología</th>';
  estados.forEach(function(e){html+='<th>'+eLbl[e]+'</th>';});
  html+='<th>Total</th></tr></thead><tbody>';
  tipos.forEach(function(t){
    var tot=0;estados.forEach(function(e){tot+=cnt[t][e];});
    if(tot===0)return;
    html+='<tr><td>'+tLbl[t]+'</td>';
    estados.forEach(function(e){
      var v=cnt[t][e];
      html+='<td class="'+(v===0?'zero':'')+'">'+( v===0?'–':v)+'</td>';
    });
    html+='<td><strong>'+tot+'</strong></td></tr>';
  });
  html+='</tbody><tfoot><tr class="tip-tot"><td>Total</td>';
  var grand=0;
  estados.forEach(function(e){
    var colT=0;tipos.forEach(function(t){colT+=(cnt[t][e]||0);});
    grand+=colT;html+='<td>'+colT+'</td>';
  });
  html+='<td>'+grand+'</td></tr></tfoot></table>';
  document.getElementById("tip-content").innerHTML=html;
  document.getElementById("mo-tip").classList.add("v");
}
function cerrarTipologia(){document.getElementById("mo-tip").classList.remove("v");}
