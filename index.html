<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hanken Grotesk',sans-serif;
  background:#1A1846;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-img{height:80px;width:auto;margin-bottom:20px;display:inline-block;}
.divider{
  width:48px;height:3px;
  background:#E18426;
  border-radius:99px;
  margin:0 auto 18px;
}
.obra-titulo{
  font-size:22px;font-weight:700;
  color:#fff;margin-bottom:6px;
  letter-spacing:-.3px;
}
.obra-sub{
  font-size:11px;color:#6B6E9A;
  letter-spacing:1.5px;
  text-transform:uppercase;
  font-weight:500;
}
.cards{
  display:flex;flex-direction:column;
  gap:12px;width:100%;max-width:340px;
}
.card{
  background:#fff;border-radius:16px;
  padding:18px 20px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;text-decoration:none;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.card:active{transform:translateY(0)}
.card-icon{
  width:50px;height:50px;
  border-radius:12px;
  display:flex;align-items:center;
  justify-content:center;
  font-size:24px;flex-shrink:0;
}
.card-icon.rs{background:#FEF3E8}
.card-icon.ap{background:#EAF3DE}
.card-body{flex:1}
.card-titulo{
  font-size:14px;font-weight:700;
  color:#1A1846;margin-bottom:3px;
}
.card-desc{font-size:11px;color:#888;line-height:1.5}
.card-arrow{
  font-size:20px;color:#E18426;
  flex-shrink:0;font-weight:700;
}
.fecha{
  text-align:center;margin-top:28px;
  font-size:11px;color:#3D3B65;
  font-weight:500;
}
.version{
  text-align:center;margin-top:6px;
  font-size:10px;color:#2E2C55;
}
</style>
</head>
